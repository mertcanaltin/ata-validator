name: Prebuild & Publish

on:
  release:
    types: [published]

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x64
          - os: windows-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install RE2 (macOS)
        if: runner.os == 'macOS'
        run: brew install re2 abseil

      - name: Install RE2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libre2-dev libabsl-dev

      - name: Install RE2 (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install re2:x64-windows abseil:x64-windows

      - name: Install dependencies
        run: npm install

      - name: Prebuild
        run: npx prebuildify --napi --strip

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/

  publish:
    needs: prebuild
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds/
          pattern: prebuild-*
          merge-multiple: true

      - name: List prebuilds
        run: |
          echo "=== Prebuild contents ==="
          find prebuilds -type f -name "*.node"
          echo "=== Total size ==="
          du -sh prebuilds/

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
